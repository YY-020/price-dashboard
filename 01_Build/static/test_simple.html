<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Simple</title>
    <style>
        body { margin: 0; font-family: Calibri, sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 200px; background: #fff; border-right: 1px solid #eee; padding: 20px; }
        .main { flex: 1; padding: 20px; background: #f5f7fc; }
        .loading { display: none; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <div class="loading" id="loading">Loading...</div>
    <div class="sidebar">
        <div class="nav-item active" data-page="overview">总览</div>
        <div class="nav-item" data-page="single">单材料</div>
    </div>
    <div class="main">
        <div class="page active" id="overviewPage">
            <h1>总览页面</h1>
            <div id="overviewGrid">Loading overview...</div>
        </div>
        <div class="page" id="singlePage">
            <h1>单材料页面</h1>
        </div>
    </div>
    <script>
        const MATERIAL_GROUPS = {
            '上游-原材料': [{key: 'lithium', label: '碳酸锂'}]
        };
        const ALL_MATERIALS = [{key: 'lithium', label: '碳酸锂'}];
        const PRICE_DATA = [
            {material_key: 'lithium', date: '2026-01-01', price: 150000, unit: 'RMB/t'},
            {material_key: 'lithium', date: '2026-01-02', price: 151000, unit: 'RMB/t'}
        ];
        
        document.getElementById('loading').classList.add('hidden');
        
        function renderOverview() {
            const grid = document.getElementById('overviewGrid');
            grid.innerHTML = '<p>碳酸锂: 150,000 RMB/t</p>';
        }
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                const pageId = item.dataset.page + 'Page';
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
            });
        });
        
        renderOverview();
        console.log('Simple test completed');
    </script>
</body>
</html>
