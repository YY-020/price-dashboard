#   name: 渠道显示名称
#   url: 主页/列表页 URL
#   type: 采集类型 (rss / html / pc)
#   rss_url: RSS 订阅地址（仅 type=rss 时有效）
#   base_url: 站点基础 URL（仅 type=pc 时有效）
#   list_urls: 列表页 URL 列表（仅 type=pc 时有效）

